<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.json">
<title>Sierra's Workout</title>
<style>
:root{--bg:#f7f7fb;--card:#fff;--ink:#111827;--muted:#6b7280;--accent:#2563eb;--soft:#dbeafe;--green:#16a34a;--border:#e5e7eb;--red:#dc2626;--yellow:#fef3c7}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}
.app{max-width:720px;margin:auto;padding:12px 12px 96px} header{position:sticky;top:0;z-index:20;background:rgba(247,247,251,.96);backdrop-filter:blur(8px);padding:6px 0 8px}
h1{font-size:1.45rem;margin:0}.muted{color:var(--muted)}.small{font-size:.84rem}.hidden{display:none!important}
nav{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}nav button{padding:9px 4px;font-size:.8rem}
button{border:0;border-radius:11px;padding:10px 12px;font-weight:750;font-size:.92rem;cursor:pointer}.primary{background:var(--accent);color:#fff}.secondary{background:var(--soft);color:#1e3a8a}.ghost{background:#f3f4f6;color:var(--ink)}.danger{background:#fee2e2;color:var(--red)}.success{background:#dcfce7;color:#166534}
.timer{background:var(--ink);color:#fff;padding:13px;border-radius:16px;display:flex;justify-content:space-between;align-items:center;gap:10px}.time{font-size:1.5rem;font-weight:800}.actions{display:flex;gap:7px;flex-wrap:wrap}
.section-title{margin:18px 2px 8px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.06em;font-size:.88rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:13px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.04)}.card.done{background:#f0fdf4;border-color:#86efac}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}.title{font-weight:850;font-size:1.04rem}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.chip{background:#f3f4f6;border-radius:999px;padding:5px 8px;font-size:.75rem;color:#374151}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.field{background:#f9fafb;border:1px solid var(--border);border-radius:11px;padding:8px}.field label{display:block;font-size:.69rem;color:var(--muted);font-weight:700}.field input,.field select,.field textarea{width:100%;border:0;background:transparent;font:inherit;font-weight:750;outline:none}.field textarea{min-height:58px;resize:vertical}
.set-row{display:grid;grid-template-columns:38px 1fr 1fr 38px;gap:7px;align-items:center;margin:7px 0}.set-num{text-align:center;font-weight:800}.icon{width:38px;height:38px;padding:0}.full{width:100%}
.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.98);border-top:1px solid var(--border);padding:9px 12px calc(9px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center;z-index:30}.bottom button{flex:1;max-width:240px}
input[type=file]{width:100%} textarea.import{width:100%;min-height:150px;border:1px solid var(--border);border-radius:12px;padding:10px;font:inherit}
dialog{width:min(94vw,620px);border:0;border-radius:18px;padding:0;box-shadow:0 25px 80px rgba(0,0,0,.25)}dialog::backdrop{background:rgba(0,0,0,.5)}.modal{padding:17px}.modal textarea{width:100%;min-height:310px}
.plan-item,.lib-item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.74rem;background:var(--yellow);color:#78350f;font-weight:700}
@media(max-width:480px){.timer{align-items:flex-start;flex-direction:column}.grid3{grid-template-columns:repeat(3,1fr)}nav button{font-size:.74rem}}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>Sierra's Workout</h1>
  <div class="muted small">Fast logging, flexible sets, saved plans, and balanced random workouts.</div>
  <nav>
    <button class="primary tabBtn" data-tab="today">Today</button>
    <button class="ghost tabBtn" data-tab="plans">Plans</button>
    <button class="ghost tabBtn" data-tab="library">Library</button>
    <button class="ghost tabBtn" data-tab="random">Randomize</button>
  </nav>
</header>

<section id="today" class="tab">
  <div class="timer">
    <div><div class="muted small" style="color:#cbd5e1">Workout time</div><div id="timer" class="time">00:00:00</div></div>
    <div class="actions"><button id="startBtn" class="primary">Start</button><button id="pauseBtn" class="ghost">Pause</button><button id="finishBtn" class="secondary">Finish</button></div>
  </div>
  <div class="section-title">Today's workout</div>
  <div id="exerciseList"></div>
  <button id="addFromLibraryBtn" class="secondary full">Add Exercise from Library</button>
  <div class="section-title">Workout notes</div>
  <div class="field"><textarea id="workoutNotes" placeholder="Overall energy, equipment delays, anything unusual..."></textarea></div>
  <div class="actions" style="margin-top:10px"><button id="saveAsFavoriteBtn" class="secondary">Save as Favorite Plan</button><button id="resetBtn" class="danger">Reset Today</button></div>
</section>

<section id="plans" class="tab hidden">
  <div class="section-title">Favorite workout plans</div>
  <div id="plansList"></div>
  <button id="saveCurrentPlanBtn" class="secondary full">Save Current Workout as Plan</button>
  <div class="section-title">Load a preplanned workout</div>
  <textarea id="planImport" class="import" placeholder="Paste a plan, one exercise per line. Example:
StairMaster
Vertical Knee Raises
Leg Press 3 x 15 @ 180
Seated Cable Row 3 x 12 @ 70"></textarea>
  <div class="actions" style="margin-top:8px"><button id="parsePlanBtn" class="primary">Load Pasted Plan</button><label class="secondary" style="padding:10px 12px;border-radius:11px;font-weight:750;cursor:pointer">Upload .txt or .json<input id="planFile" type="file" accept=".txt,.json" hidden></label></div>
</section>

<section id="library" class="tab hidden">
  <div class="section-title">Exercise library</div>
  <div class="grid2">
    <div class="field"><label>Filter group</label><select id="groupFilter"><option value="">All groups</option><option>Upper Body</option><option>Lower Body</option><option>Core</option><option>Cardio</option><option>Total Body</option></select></div>
    <div class="field"><label>Search</label><input id="librarySearch" placeholder="Exercise or muscle"></div>
  </div>
  <div id="libraryList" style="margin-top:10px"></div>
  <div class="section-title">Add custom exercise</div>
  <div class="card">
    <div class="grid3">
      <div class="field"><label>Name</label><input id="newName"></div>
      <div class="field"><label>Muscle</label><input id="newMuscle"></div>
      <div class="field"><label>Group</label><select id="newGroup"><option>Upper Body</option><option>Lower Body</option><option>Core</option><option>Cardio</option><option>Total Body</option></select></div>
    </div>
    <button id="addCustomBtn" class="primary full" style="margin-top:9px">Add to Library</button>
  </div>
</section>

<section id="random" class="tab hidden">
  <div class="section-title">Balanced workout randomizer</div>
  <div class="card">
    <div class="grid2">
      <div class="field"><label>Workout type</label><select id="randomType"><option>Upper Body</option><option>Lower Body</option><option>Total Body</option><option>Core</option></select></div>
      <div class="field"><label>Number of exercises</label><select id="randomCount"><option>5</option><option selected>6</option><option>7</option><option>8</option></select></div>
    </div>
    <button id="randomizeBtn" class="primary full" style="margin-top:9px">Create Random Workout</button>
  </div>
  <div id="randomPreview"></div>
</section>
</div>

<div class="bottom" id="bottomBar"><button id="copyBtn" class="primary">Copy Summary</button><button id="saveBtn" class="secondary">Save Workout</button></div>

<dialog id="addDialog"><div class="modal">
<h2>Add from Library</h2>
<div class="field"><label>Exercise</label><select id="addSelect"></select></div>
<div class="actions" style="margin-top:10px"><button onclick="addDialog.close()" class="ghost">Cancel</button><button id="confirmAddBtn" class="primary">Add</button></div>
</div></dialog>

<dialog id="summaryDialog"><div class="modal">
<h2>Workout Summary</h2><textarea id="summaryText"></textarea>
<div class="actions"><button onclick="summaryDialog.close()" class="ghost">Close</button><button id="copyDialogBtn" class="primary">Copy</button></div>
</div></dialog>

<script>
const BASE_LIBRARY = [
{name:"StairMaster",muscle:"Cardiovascular / Legs",group:"Cardio",type:"cardio",sets:[],minutes:5,floors:0},
{name:"Treadmill Walk",muscle:"Cardiovascular / Legs",group:"Cardio",type:"cardio",sets:[],minutes:10,floors:0},
{name:"Elliptical",muscle:"Cardiovascular / Total Body",group:"Cardio",type:"cardio",sets:[],minutes:10,floors:0},
{name:"Vertical Knee Raises",muscle:"Abdominals / Hip Flexors",group:"Core",type:"strength",sets:[{reps:10,weight:""},{reps:10,weight:""},{reps:10,weight:""}]},
{name:"Single-Leg Vertical Knee Raises",muscle:"Lower Abdominals / Hip Flexors",group:"Core",type:"strength",sets:[{reps:15,weight:""},{reps:15,weight:""},{reps:15,weight:""}]},
{name:"Rotary Torso",muscle:"Obliques",group:"Core",type:"strength",sets:[{reps:15,weight:100},{reps:15,weight:100},{reps:15,weight:100}]},
{name:"Back Extension",muscle:"Lower Back / Glutes",group:"Core",type:"strength",sets:[{reps:15,weight:70},{reps:15,weight:70},{reps:15,weight:70}]},
{name:"Leg Press",muscle:"Quadriceps / Glutes / Hamstrings",group:"Lower Body",type:"strength",sets:[{reps:15,weight:180},{reps:15,weight:180},{reps:15,weight:180}]},
{name:"Hip Abductor",muscle:"Outer Glutes / Hip Abductors",group:"Lower Body",type:"strength",sets:[{reps:25,weight:100},{reps:20,weight:100},{reps:20,weight:100}]},
{name:"Hip Adductor",muscle:"Inner Thighs / Adductors",group:"Lower Body",type:"strength",sets:[{reps:15,weight:100},{reps:15,weight:100},{reps:15,weight:100}]},
{name:"Calf Extension",muscle:"Calves",group:"Lower Body",type:"strength",sets:[{reps:15,weight:145},{reps:15,weight:145},{reps:15,weight:145}]},
{name:"Cable Deadlift",muscle:"Glutes / Hamstrings / Lower Back",group:"Lower Body",type:"strength",sets:[{reps:12,weight:17.5},{reps:12,weight:17.5},{reps:12,weight:17.5}]},
{name:"Seated Cable Row",muscle:"Lats / Rhomboids / Biceps",group:"Upper Body",type:"strength",sets:[{reps:12,weight:70},{reps:12,weight:70},{reps:12,weight:70}]},
{name:"Spring Seated Row",muscle:"Lats / Rhomboids / Biceps",group:"Upper Body",type:"strength",sets:[{reps:10,weight:80},{reps:10,weight:80},{reps:10,weight:80}]},
{name:"Lat Pulldown",muscle:"Lats / Biceps",group:"Upper Body",type:"strength",sets:[{reps:15,weight:70},{reps:15,weight:70},{reps:15,weight:70}]},
{name:"Cable Face Pull",muscle:"Rear Delts / Upper Back",group:"Upper Body",type:"strength",sets:[{reps:12,weight:27.5},{reps:12,weight:27.5},{reps:12,weight:27.5}]},
{name:"Chest Press",muscle:"Chest / Triceps / Front Delts",group:"Upper Body",type:"strength",sets:[{reps:12,weight:50},{reps:12,weight:50},{reps:12,weight:50}]},
{name:"Triceps Press",muscle:"Triceps",group:"Upper Body",type:"strength",sets:[{reps:15,weight:75},{reps:15,weight:75},{reps:15,weight:75}]},
{name:"Cable Triceps Pushdown",muscle:"Triceps",group:"Upper Body",type:"strength",sets:[{reps:10,weight:27.5},{reps:10,weight:27.5},{reps:10,weight:27.5}]},
{name:"Assisted Dips",muscle:"Triceps / Chest",group:"Upper Body",type:"strength",sets:[{reps:10,weight:90},{reps:10,weight:90},{reps:10,weight:90}]},
{name:"Dumbbell Bicep Curls",muscle:"Biceps",group:"Upper Body",type:"strength",sets:[{reps:15,weight:10},{reps:15,weight:10},{reps:15,weight:10}]},
{name:"Dumbbell Hammer Curls",muscle:"Biceps / Brachialis",group:"Upper Body",type:"strength",sets:[{reps:15,weight:10},{reps:15,weight:10},{reps:15,weight:10}]},
{name:"Horizontal Hammer Curls",muscle:"Biceps",group:"Upper Body",type:"strength",sets:[{reps:10,weight:10},{reps:10,weight:10},{reps:10,weight:10}]},
{name:"Dumbbell Shoulder Press",muscle:"Shoulders / Triceps",group:"Upper Body",type:"strength",sets:[{reps:10,weight:10},{reps:10,weight:10},{reps:10,weight:10}]},
{name:"Cable Bicep Curl",muscle:"Biceps",group:"Upper Body",type:"strength",sets:[{reps:15,weight:12.5},{reps:15,weight:12.5},{reps:15,weight:12.5}]},
{name:"Straight-Arm Cable Pulldown",muscle:"Lats / Core",group:"Upper Body",type:"strength",sets:[{reps:15,weight:27.5},{reps:15,weight:27.5},{reps:15,weight:27.5}]}
];
const clone=o=>JSON.parse(JSON.stringify(o));
let library=JSON.parse(localStorage.getItem("sw2_library")||"null")||clone(BASE_LIBRARY);
let exercises=JSON.parse(localStorage.getItem("sw2_today")||"null")||clone([
BASE_LIBRARY[0],BASE_LIBRARY[3],BASE_LIBRARY[7],BASE_LIBRARY[12],BASE_LIBRARY[8],BASE_LIBRARY[18],BASE_LIBRARY[15],BASE_LIBRARY[6]
]).map(x=>({...x,done:false,effort:"",note:""}));
let plans=JSON.parse(localStorage.getItem("sw2_plans")||"[]");
let running=localStorage.getItem("sw2_running")==="true", start=Number(localStorage.getItem("sw2_start"))||null, elapsed=Number(localStorage.getItem("sw2_elapsed"))||0, end=Number(localStorage.getItem("sw2_end"))||null, interval;
const $=id=>document.getElementById(id);

function persist(){
 localStorage.setItem("sw2_library",JSON.stringify(library));
 localStorage.setItem("sw2_today",JSON.stringify(exercises));
 localStorage.setItem("sw2_plans",JSON.stringify(plans));
 localStorage.setItem("sw2_running",running);localStorage.setItem("sw2_start",start||"");localStorage.setItem("sw2_elapsed",elapsed);localStorage.setItem("sw2_end",end||"");
 localStorage.setItem("sw2_notes",$("workoutNotes").value);
}
function elapsedNow(){return elapsed+(running&&start?Date.now()-start:0)}
function fmt(ms){let s=Math.floor(ms/1000);return `${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor(s%3600/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`}
function tick(){$("timer").textContent=fmt(elapsedNow())}
function startTimer(){if(!running){start=Date.now();running=true;end=null;interval=setInterval(tick,1000);persist();tick()}}
function pauseTimer(){if(running){elapsed+=Date.now()-start;running=false;start=null;clearInterval(interval);persist();tick()}}
function finishTimer(){pauseTimer();end=Date.now();persist()}

function setSummary(ex){
 if(ex.type==="cardio")return `${ex.minutes||0} min${ex.floors!==""?`, ${ex.floors||0} floors`:""}`;
 return ex.sets.map((s,i)=>`${i+1}: ${s.reps||0}${s.weight!==""?` @ ${s.weight} lb`:""}`).join(" • ");
}
function renderToday(){
 $("exerciseList").innerHTML="";
 exercises.forEach((ex,i)=>{
  let d=document.createElement("div");d.className="card"+(ex.done?" done":"");
  let setHtml=ex.type==="cardio"?`<div class="grid2"><div class="field"><label>Minutes</label><input inputmode="decimal" value="${ex.minutes??""}" oninput="updateCardio(${i},'minutes',this.value)"></div><div class="field"><label>Floors</label><input inputmode="numeric" value="${ex.floors??""}" oninput="updateCardio(${i},'floors',this.value)"></div></div>`:
  `<div>${ex.sets.map((s,j)=>`<div class="set-row"><div class="set-num">${j+1}</div><div class="field"><label>Reps</label><input inputmode="numeric" value="${s.reps??""}" oninput="updateSet(${i},${j},'reps',this.value)"></div><div class="field"><label>Weight</label><input inputmode="decimal" value="${s.weight??""}" oninput="updateSet(${i},${j},'weight',this.value)"></div><button class="icon danger" onclick="removeSet(${i},${j})">×</button></div>`).join("")}</div><button class="ghost full" onclick="addSet(${i})">+ Add Different Set</button>`;
  d.innerHTML=`<div class="row"><div><div class="title">${ex.name}</div><div class="chips"><span class="chip">${ex.muscle}</span><span class="chip">${ex.group}</span></div></div><div class="actions"><button class="icon ghost" onclick="moveEx(${i},-1)">↑</button><button class="icon ghost" onclick="moveEx(${i},1)">↓</button></div></div>
  <div class="muted small" style="margin:7px 0">Current: ${setSummary(ex)}</div>${setHtml}
  <div class="grid2" style="margin-top:8px"><div class="field"><label>Effort</label><select onchange="updateMeta(${i},'effort',this.value)"><option value="">Select</option>${["Easy","Moderate","Hard","Struggle","Pain/Stop"].map(v=>`<option ${ex.effort===v?"selected":""}>${v}</option>`).join("")}</select></div><div class="field"><label>Exercise note</label><input value="${(ex.note||"").replace(/"/g,"&quot;")}" placeholder="Optional" oninput="updateMeta(${i},'note',this.value)"></div></div>
  <button class="primary full" style="margin-top:8px" onclick="toggleDone(${i})">${ex.done?"Completed ✓":"Mark Complete"}</button>`;
  $("exerciseList").appendChild(d);
 });
}
window.updateSet=(i,j,k,v)=>{exercises[i].sets[j][k]=v;persist()};window.updateCardio=(i,k,v)=>{exercises[i][k]=v;persist()};window.updateMeta=(i,k,v)=>{exercises[i][k]=v;persist()};
window.addSet=i=>{let last=exercises[i].sets.at(-1)||{reps:10,weight:""};exercises[i].sets.push(clone(last));renderToday();persist()};
window.removeSet=(i,j)=>{if(exercises[i].sets.length>1)exercises[i].sets.splice(j,1);renderToday();persist()};
window.toggleDone=i=>{exercises[i].done=!exercises[i].done;renderToday();persist()};
window.moveEx=(i,dir)=>{let t=i+dir;if(t<0||t>=exercises.length)return;[exercises[i],exercises[t]]=[exercises[t],exercises[i]];renderToday();persist()};

function renderLibrary(){
 let q=$("librarySearch").value.toLowerCase(),g=$("groupFilter").value;$("libraryList").innerHTML="";
 library.filter(x=>(!g||x.group===g)&&(!q||`${x.name} ${x.muscle}`.toLowerCase().includes(q))).forEach((ex,i)=>{
  let d=document.createElement("div");d.className="card lib-item";d.innerHTML=`<div><div class="title">${ex.name}</div><div class="chips"><span class="chip">${ex.muscle}</span><span class="chip">${ex.group}</span></div></div><button class="secondary" onclick="addNamed('${ex.name.replace(/'/g,"\\'")}')">Add</button>`;$("libraryList").appendChild(d);
 });
 fillAddSelect();
}
window.addNamed=name=>{let ex=library.find(x=>x.name===name);if(ex){exercises.push({...clone(ex),done:false,effort:"",note:""});renderToday();persist()}};
function fillAddSelect(){$("addSelect").innerHTML=library.map(x=>`<option>${x.name}</option>`).join("")}

function renderPlans(){
 $("plansList").innerHTML=plans.length?"":"<div class='card muted'>No favorite plans saved yet.</div>";
 plans.forEach((p,i)=>{let d=document.createElement("div");d.className="card plan-item";d.innerHTML=`<div><div class="title">${p.name}</div><div class="muted small">${p.exercises.length} exercises</div></div><div class="actions"><button class="primary" onclick="loadPlan(${i})">Load</button><button class="danger" onclick="deletePlan(${i})">Delete</button></div>`;$("plansList").appendChild(d)});
}
function savePlan(){let name=prompt("Name this workout plan");if(!name)return;plans.push({name,exercises:exercises.map(e=>({...clone(e),done:false,effort:"",note:""}))});renderPlans();persist()}
window.loadPlan=i=>{exercises=clone(plans[i].exercises);renderToday();persist();switchTab("today")};window.deletePlan=i=>{plans.splice(i,1);renderPlans();persist()};

function parsePlan(text){
 let names=text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean),loaded=[];
 for(let line of names){let lower=line.toLowerCase(),match=library.find(x=>lower.startsWith(x.name.toLowerCase())||lower.includes(x.name.toLowerCase()));
  if(match){let ex={...clone(match),done:false,effort:"",note:""};let m=line.match(/(\d+)\s*[x×]\s*(\d+)(?:\s*@\s*([\d.]+))?/i);if(m&&ex.type==="strength"){ex.sets=Array.from({length:Number(m[1])},()=>({reps:Number(m[2]),weight:m[3]?Number(m[3]):(ex.sets[0]?.weight??"")}))}loaded.push(ex)}
 }
 if(loaded.length){exercises=loaded;renderToday();persist();switchTab("today");alert(`Loaded ${loaded.length} exercises.`)}else alert("No library exercises were recognized. Add missing exercises to the Library first.");
}

function uniquePick(arr,n){let copy=[...arr],out=[];while(copy.length&&out.length<n){out.push(copy.splice(Math.floor(Math.random()*copy.length),1)[0])}return out}
function randomWorkout(type,count){
 let chosen=[],upper=library.filter(x=>x.group==="Upper Body"),lower=library.filter(x=>x.group==="Lower Body"),core=library.filter(x=>x.group==="Core"),cardio=library.filter(x=>x.group==="Cardio");
 if(type==="Upper Body"){
  let push=upper.filter(x=>/Chest|Triceps|Shoulder|Dips/.test(x.name)),pull=upper.filter(x=>/Row|Pulldown|Face Pull|Bicep|Curl/.test(x.name));
  chosen=[...uniquePick(push,Math.ceil(count/2)),...uniquePick(pull,Math.floor(count/2))];
 }else if(type==="Lower Body") chosen=uniquePick(lower,count);
 else if(type==="Core") chosen=uniquePick(core,count);
 else{
  chosen=[...uniquePick(lower,2),...uniquePick(upper.filter(x=>/Chest|Triceps|Shoulder|Dips/.test(x.name)),1),...uniquePick(upper.filter(x=>/Row|Pulldown|Face Pull|Bicep|Curl/.test(x.name)),1),...uniquePick(core,1),...uniquePick(cardio,1)];
  if(chosen.length<count)chosen.push(...uniquePick(library.filter(x=>!chosen.some(c=>c.name===x.name)),count-chosen.length));
 }
 return chosen.slice(0,count);
}
function showRandom(){
 let type=$("randomType").value,count=Number($("randomCount").value),r=randomWorkout(type,count);
 $("randomPreview").innerHTML=`<div class="section-title">Suggested ${type} Workout</div>`+r.map(x=>`<div class="card"><div class="title">${x.name}</div><div class="chips"><span class="chip">${x.muscle}</span><span class="chip">${x.group}</span></div></div>`).join("")+`<button id="loadRandomBtn" class="primary full">Load This Workout</button>`;
 $("loadRandomBtn").onclick=()=>{exercises=r.map(x=>({...clone(x),done:false,effort:"",note:""}));renderToday();persist();switchTab("today")};
}

function buildSummary(){
 let mins=Math.round(elapsedNow()/60000),lines=[`Workout — ${new Date().toLocaleDateString()}`,`${mins} min`,""];
 exercises.filter(x=>x.done).forEach(ex=>{
  if(ex.type==="cardio")lines.push(`✔ ${ex.name}: ${ex.minutes||0} min, ${ex.floors||0} floors`);
  else{let grouped=[];for(let s of ex.sets){let key=`${s.reps||0}${s.weight!==""?` @ ${s.weight} lb`:""}`,last=grouped.at(-1);if(last&&last.key===key)last.count++;else grouped.push({key,count:1})}lines.push(`✔ ${ex.name}: `+grouped.map(g=>`${g.count} × ${g.key}`).join(", "))}
  if(ex.effort)lines.push(`  Effort: ${ex.effort}`);if(ex.note)lines.push(`  Note: ${ex.note}`);
 });
 let n=$("workoutNotes").value.trim();if(n)lines.push("",`Workout notes: ${n}`);return lines.join("\n")
}
function saveWorkout(){
 let hist=JSON.parse(localStorage.getItem("sw2_history")||"[]");hist.push({date:new Date().toISOString(),duration:elapsedNow(),exercises:exercises.filter(x=>x.done),notes:$("workoutNotes").value});localStorage.setItem("sw2_history",JSON.stringify(hist));
 exercises.forEach(ex=>{if(ex.done){let l=library.find(x=>x.name===ex.name);if(l)Object.assign(l,clone(ex),{done:undefined,effort:undefined,note:undefined})}});
 exercises=exercises.map(x=>({...x,done:false,effort:"",note:""}));running=false;start=null;end=null;elapsed=0;$("workoutNotes").value="";clearInterval(interval);persist();renderToday();tick();alert("Workout saved and latest sets updated in the library.")
}
function switchTab(id){document.querySelectorAll(".tab").forEach(x=>x.classList.add("hidden"));$(id).classList.remove("hidden");document.querySelectorAll(".tabBtn").forEach(b=>{b.className="ghost tabBtn";if(b.dataset.tab===id)b.className="primary tabBtn"});$("bottomBar").classList.toggle("hidden",id!=="today")}
document.querySelectorAll(".tabBtn").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
$("startBtn").onclick=startTimer;$("pauseBtn").onclick=pauseTimer;$("finishBtn").onclick=finishTimer;
$("addFromLibraryBtn").onclick=()=>{fillAddSelect();addDialog.showModal()};$("confirmAddBtn").onclick=()=>{addNamed($("addSelect").value);addDialog.close()};
$("librarySearch").oninput=renderLibrary;$("groupFilter").onchange=renderLibrary;
$("addCustomBtn").onclick=()=>{let name=$("newName").value.trim(),muscle=$("newMuscle").value.trim(),group=$("newGroup").value;if(!name||!muscle)return alert("Enter both a name and muscle.");library.push({name,muscle,group,type:group==="Cardio"?"cardio":"strength",sets:group==="Cardio"?[]:[{reps:10,weight:""},{reps:10,weight:""},{reps:10,weight:""}],minutes:group==="Cardio"?10:undefined,floors:group==="Cardio"?0:undefined});$("newName").value=$("newMuscle").value="";renderLibrary();persist()};
$("saveCurrentPlanBtn").onclick=savePlan;$("saveAsFavoriteBtn").onclick=savePlan;$("parsePlanBtn").onclick=()=>parsePlan($("planImport").value);
$("planFile").onchange=async e=>{let f=e.target.files[0];if(!f)return;let text=await f.text();if(f.name.endsWith(".json")){try{let data=JSON.parse(text);if(Array.isArray(data)){exercises=data;renderToday();persist();switchTab("today")}else alert("JSON must contain an array of exercises.")}catch{alert("That JSON file could not be read.")}}else parsePlan(text)};
$("randomizeBtn").onclick=showRandom;
$("copyBtn").onclick=()=>{$("summaryText").value=buildSummary();summaryDialog.showModal();navigator.clipboard?.writeText($("summaryText").value)};$("copyDialogBtn").onclick=()=>navigator.clipboard.writeText($("summaryText").value);
$("saveBtn").onclick=saveWorkout;$("resetBtn").onclick=()=>{if(confirm("Reset today's workout?")){exercises=[];running=false;start=null;elapsed=0;$("workoutNotes").value="";persist();renderToday();tick()}};
$("workoutNotes").value=localStorage.getItem("sw2_notes")||"";$("workoutNotes").oninput=persist;
if(running)interval=setInterval(tick,1000);tick();renderToday();renderLibrary();renderPlans();fillAddSelect();
if("serviceWorker"in navigator)navigator.serviceWorker.register("service-worker.js").catch(()=>{});
</script>
